<style>
:root{--bg:#f4efe8;--bg-soft:#fbf8f4;--panel:#fff;--panel-alt:#f8f4ed;--ink:#171a1f;--muted:#6c7480;--line:#e6ddd1;--line-strong:#d0c5b6;--accent:#111;--blue:#2c5e86;--blue-soft:#eaf1f7;--positive:#2e7d32;--positive-bg:#eaf5eb;--warning:#8b5e3c;--warning-bg:#fbefe7;--danger:#9b3232;--danger-bg:#fbe9e9;--info:#334155;--info-bg:#edf2f7;--shadow:0 14px 30px rgba(23,26,31,.08);--shadow-soft:0 6px 18px rgba(23,26,31,.05);--font:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--transition:180ms ease}*{box-sizing:border-box}body{margin:0;font-family:var(--font);background:radial-gradient(circle at top right,rgba(44,94,134,.08),transparent 24%),linear-gradient(180deg,var(--bg-soft),var(--bg));color:var(--ink)}.hidden{display:none!important}.auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}.auth-card{width:min(540px,100%);background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);overflow:hidden}.auth-header{padding:26px;background:linear-gradient(180deg,#fff,#faf7f2);border-bottom:1px solid var(--line)}.auth-logo{font-size:2.5rem;font-weight:950;letter-spacing:-.12em;line-height:1;margin-bottom:10px}.auth-header h1{margin:0;font-size:1.5rem;letter-spacing:-.04em}.auth-header p{margin:8px 0 0;color:var(--muted);line-height:1.45}.auth-body{padding:24px;display:grid;gap:14px}.auth-message{display:none;padding:12px;border-radius:14px;background:var(--blue-soft);color:var(--blue);font-weight:800;font-size:.9rem}.auth-message.error{display:block;background:var(--danger-bg);color:var(--danger)}.auth-message.success{display:block;background:var(--positive-bg);color:var(--positive)}.app-shell{min-height:100vh;padding:20px}.frame{max-width:1600px;margin:0 auto;background:rgba(255,255,255,.86);border:1px solid rgba(17,17,17,.06);backdrop-filter:blur(10px);border-radius:26px;overflow:hidden;box-shadow:var(--shadow)}.topbar{padding:18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#faf7f2);display:grid;gap:12px}.topbar-main{display:grid;grid-template-columns:minmax(420px,1fr) minmax(640px,1fr);gap:18px;align-items:start}.brand{display:flex;align-items:flex-start;gap:18px}.brand-mark{display:grid;gap:4px;line-height:1}.brand-logo{font-size:4.75rem;font-weight:950;letter-spacing:-.13em;color:#111}.brand-name{font-size:1rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:#111}.brand-sub{margin-top:4px;font-size:.76rem;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase}.right-head{display:grid;gap:10px;justify-items:end}.header-actions{display:flex;justify-content:flex-end;align-items:center;gap:8px;flex-wrap:wrap}.btn,button,select,input,textarea{font-family:inherit}.btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:12px;padding:11px 14px;font-size:.92rem;cursor:pointer;transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition),background var(--transition);box-shadow:0 1px 1px rgba(17,17,17,.02);font-weight:800}.btn:hover{transform:translateY(-1px);border-color:var(--line-strong);box-shadow:var(--shadow-soft)}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.black,.header-actions .btn{background:#111;color:#fff;border-color:#111}.btn.secondary{background:#fff;border-color:#cfc6b8}.btn.warn{background:var(--warning-bg);border-color:#ecd5be;color:var(--warning)}.btn.danger{background:#fff0f0;border-color:#efc0c0;color:#7a1f1f}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}.user-row-top{display:flex;justify-content:flex-end}.user-email-top{font-size:.76rem;font-weight:600;color:var(--muted);text-align:right;white-space:nowrap}.search-center-row{display:flex;justify-content:center;align-items:center;width:100%}.search-box{min-width:0;display:flex;align-items:center;gap:10px;padding:0 12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;height:44px}.search-box-wide{width:min(980px,100%);max-width:980px;margin:0 auto}.search-box input{border:none;outline:none;background:transparent;width:100%;font-size:.94rem}.navs{padding:2px 22px 18px;background:linear-gradient(180deg,#faf7f2,#f4efe8);border-bottom:1px solid var(--line)}.primary-tabs,.secondary-tabs{display:flex;gap:10px;flex-wrap:wrap}.primary-tabs{padding-top:16px}.secondary-tabs{padding-top:14px}.tab-btn{background:transparent;border:1px solid transparent;border-radius:999px;padding:11px 16px;color:var(--muted);cursor:pointer;font-weight:800;letter-spacing:.01em}.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:var(--shadow-soft)}.screen{display:none}.screen.active{display:block}.content-area{padding:22px}.hero{display:grid;grid-template-columns:1.3fr .9fr;gap:18px;margin-bottom:18px}.hero-card{background:linear-gradient(180deg,#111,#161a1f);color:#fff;padding:28px;border-radius:24px;min-height:176px;position:relative;overflow:hidden}.hero-card:after{content:"";position:absolute;inset:auto -60px -90px auto;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.18),rgba(255,255,255,0) 72%)}.hero-card h1{margin:0 0 8px;font-size:2rem;line-height:1.1;letter-spacing:-.04em}.hero-card p{margin:0;max-width:760px;color:rgba(255,255,255,.86);line-height:1.55}.hero-meta{display:grid;grid-template-columns:1fr 1fr;gap:14px}.mini-card,.card{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow-soft)}.mini-card{border-radius:20px;padding:20px}.card{border-radius:22px}.card-header{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.card-body{padding:18px 20px}.eyebrow{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;font-weight:900}.value{font-size:2rem;font-weight:900;letter-spacing:-.04em;margin-top:6px}.sub{margin-top:6px;color:var(--muted);font-size:.86rem}.kpi-grid,.queue-grid{display:grid;gap:16px;margin-bottom:18px}.kpi-grid{grid-template-columns:repeat(5,minmax(170px,1fr))}.queue-grid{grid-template-columns:repeat(4,minmax(220px,1fr))}.kpi-grid .card-body,.queue-grid .card-body{text-align:center}.dashboard-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.layout-grid{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start}.filters{position:sticky;top:16px}.filter-grid{display:grid;gap:12px}label,label.filter-label{display:grid;gap:6px;font-size:.88rem;color:var(--muted);font-weight:800}input[type=text],input[type=email],input[type=password],input[type=date],select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);outline:none;font-size:.94rem}textarea{min-height:90px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(44,94,134,.12)}.filter-actions,.row-actions{display:flex;gap:10px;flex-wrap:wrap}.table-wrap{overflow:auto}.table-wrap.wide-table{max-height:70vh}.table-wrap.wide-table table{min-width:1260px}table{width:100%;border-collapse:separate;border-spacing:0;font-size:.93rem}th,td{padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap;vertical-align:middle}th{position:sticky;top:0;background:#fbf8f4;z-index:2;color:var(--muted);text-transform:uppercase;font-size:.74rem;letter-spacing:.08em;text-align:left;cursor:pointer}td.wrap{white-space:normal;min-width:220px;line-height:1.45}tbody tr:hover{background:#faf7f2}.badge{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px;border-radius:999px;font-size:.78rem;font-weight:800;letter-spacing:.02em;border:1px solid transparent}.badge.Opportunities{background:#f1f1f1;color:#555;border-color:#ddd}.badge.Bidding{background:var(--warning-bg);color:var(--warning);border-color:#efd792}.badge.Submitted{background:#f2f3f5;color:#374151;border-color:#d8dde4}.badge.Won{background:var(--positive-bg);color:var(--positive);border-color:#b8dbc7}.badge.Lost{background:var(--danger-bg);color:var(--danger);border-color:#e6bcbc}.row-actions .btn{padding:8px 10px;font-size:.8rem;border-radius:10px}.view-toolbar{display:grid;grid-template-columns:minmax(220px,1.2fr) repeat(3,minmax(150px,.75fr)) auto;gap:10px;margin-bottom:18px;align-items:center}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:14px}.form-grid .full{grid-column:1/-1}.admin-grid{display:grid;grid-template-columns:repeat(2,minmax(300px,1fr));gap:18px}.notice{padding:12px 14px;border-radius:14px;background:#f5f5f5;border:1px solid var(--line);color:var(--muted);font-size:.9rem}.empty-state{padding:32px;text-align:center;color:var(--muted)}.overlay{position:fixed;inset:0;background:rgba(17,17,17,.28);opacity:0;pointer-events:none;transition:opacity 180ms ease;z-index:70}.overlay.open{opacity:1;pointer-events:auto}.modal{position:fixed;inset:0;display:grid;place-items:center;padding:24px;z-index:90;pointer-events:none;opacity:0;transition:opacity 160ms ease}.modal.open{opacity:1;pointer-events:auto}.modal-card{width:min(900px,100%);max-height:calc(100vh - 60px);overflow:auto;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 30px 60px rgba(17,17,17,.2)}.modal-header{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.modal-body{padding:20px 22px 24px;display:grid;gap:18px}.toasts{position:fixed;left:24px;bottom:24px;display:grid;gap:10px;z-index:100}.toast{background:#111;color:#fff;padding:12px 14px;border-radius:14px;box-shadow:0 16px 24px rgba(17,17,17,.22);min-width:260px;font-weight:800}@media(max-width:1280px){.topbar-main,.hero,.dashboard-grid,.layout-grid{grid-template-columns:1fr}.right-head{justify-items:start}.header-actions,.user-row-top{justify-content:flex-start}.user-email-top{text-align:left}.view-toolbar{grid-template-columns:1fr 1fr}.kpi-grid,.queue-grid,.hero-meta{grid-template-columns:repeat(2,minmax(180px,1fr))}.admin-grid{grid-template-columns:1fr}.filters{position:static}}@media(max-width:860px){.app-shell{padding:10px}.frame{border-radius:20px}.content-area,.navs,.topbar{padding-left:14px;padding-right:14px}.brand-logo{font-size:3.1rem}.brand-name{font-size:.82rem}.kpi-grid,.queue-grid,.hero-meta,.form-grid{grid-template-columns:1fr}.search-box{min-width:100%}.view-toolbar{grid-template-columns:1fr}}
</style>

<body>
<div id="authScreen" class="auth-wrap"><div class="auth-card"><div class="auth-header"><div class="auth-logo">UBG</div><h1>Bid and Proposal Management</h1><p id="authIntro">Secure access for United Building Group bid opportunities.</p></div><div class="auth-body"><div id="authMessage" class="auth-message"></div><div id="setupPanel" class="hidden"><label>Admin Email<input id="setupEmail" type="email" placeholder="admin@unitedbuildinggroup.com" /></label><label>Admin Password<input id="setupPassword" type="password" placeholder="Minimum 8 characters" /></label><button class="btn black" onclick="setupAdmin()">Create Admin Login</button><div class="notice">This appears only when no users exist. The first user becomes the admin.</div></div><div id="loginPanel" class="hidden"><label>Email<input id="loginEmail" type="email" placeholder="your email" /></label><label>Password<input id="loginPassword" type="password" placeholder="your password" /></label><button class="btn black" onclick="login()">Login</button></div></div></div></div>
<div id="appScreen" class="app-shell hidden"><div class="frame"><header class="topbar"><div class="topbar-main"><div class="brand"><div class="brand-mark"><div class="brand-logo">UBG</div><div class="brand-name">United Building Group</div><div class="brand-sub">Bid and Proposal Management</div></div></div><div class="right-head"><div class="header-actions"><button class="btn" onclick="openBidModal()">Add Bid</button><button class="btn" onclick="loadBids()">Refresh</button><button class="btn" onclick="exportCsv()">Export CSV</button><button class="btn" onclick="showScreen('admin')">Admin</button><button class="btn" onclick="logout()">Logout</button></div><div class="user-row-top"><div id="currentUser" class="user-email-top">Loading user...</div></div></div></div><div class="search-center-row"><div class="search-box search-box-wide"><span>Search</span><input id="globalSearch" type="text" placeholder="Search project, client, estimator, source, notes..." oninput="setSearch(this.value)" /></div></div></header><nav class="navs"><div class="primary-tabs"><button id="tab-dashboard" class="tab-btn active" onclick="showScreen('dashboard')">Dashboard</button><button id="tab-opportunities" class="tab-btn" onclick="showScreen('opportunities')">Bid Opportunities</button><button id="tab-board" class="tab-btn" onclick="showScreen('board')">Bid Board</button><button id="tab-pipeline" class="tab-btn" onclick="showScreen('pipeline')">Proposal Pipeline</button><button id="tab-admin" class="tab-btn" onclick="showScreen('admin')">Settings / Admin</button></div><div class="secondary-tabs"><button id="filter-All" class="tab-btn active" onclick="setStatusFilter('All')">All</button><button id="filter-Opportunities" class="tab-btn" onclick="setStatusFilter('Opportunities')">Opportunities</button><button id="filter-Bidding" class="tab-btn" onclick="setStatusFilter('Bidding')">Bidding</button><button id="filter-Submitted" class="tab-btn" onclick="setStatusFilter('Submitted')">Submitted</button><button id="filter-Won" class="tab-btn" onclick="setStatusFilter('Won')">Won</button><button id="filter-Lost" class="tab-btn" onclick="setStatusFilter('Lost')">Lost</button></div></nav><main class="content-area"><section id="screen-dashboard" class="screen active"></section><section id="screen-opportunities" class="screen"></section><section id="screen-board" class="screen"></section><section id="screen-pipeline" class="screen"></section><section id="screen-admin" class="screen"></section></main></div></div>
<div id="overlay" class="overlay" onclick="closeModal()"></div><div id="modal" class="modal"></div><div id="toasts" class="toasts"></div>
<script>
(()=>{const API_BASE=(localStorage.getItem('ubg_api_base')||'https://ubg-backend-6h03.onrender.com').replace(/\/$/,'');const TOKEN_KEY='ubg_auth_token_v117';const STATUS_ORDER=['Opportunities','Bidding','Submitted','Won','Lost'];const state={token:localStorage.getItem(TOKEN_KEY)||'',user:null,bids:[],users:[],screen:'dashboard',statusFilter:'All',search:'',filters:{estimator:'All',source:'All'}};const $=id=>document.getElementById(id);const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const fmtDate=v=>!v?'-':new Date(v+(String(v).length===10?'T00:00:00':'')).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});window.setupAdmin=setupAdmin;window.login=login;window.logout=logout;window.showScreen=showScreen;window.setStatusFilter=setStatusFilter;window.setSearch=setSearch;window.loadBids=loadBids;window.openBidModal=openBidModal;window.closeModal=closeModal;window.exportCsv=exportCsv;async function api(path,options={}){const headers=Object.assign({'Content-Type':'application/json'},options.headers||{});if(state.token)headers.Authorization='Bearer '+state.token;const res=await fetch(API_BASE+path,Object.assign({},options,{headers}));let data=null;try{data=await res.json()}catch{}if(!res.ok)throw new Error((data&&data.error)||'Request failed: '+res.status);return data}function authMessage(text,type='error'){const el=$('authMessage');el.textContent=text||'';el.className=text?'auth-message '+type:'auth-message'}function toast(text){const t=document.createElement('div');t.className='toast';t.textContent=text;$('toasts').appendChild(t);setTimeout(()=>t.remove(),3600)}async function init(){authMessage('Checking backend connection...','success');try{const health=await fetch(API_BASE+'/health').then(r=>r.json());if(state.token){try{const me=await api('/auth/me');state.user=me.user;await enterApp();return}catch{localStorage.removeItem(TOKEN_KEY);state.token=''}}$('authScreen').classList.remove('hidden');$('appScreen').classList.add('hidden');authMessage('');$('setupPanel').classList.toggle('hidden',!!health.login_ready);$('loginPanel').classList.toggle('hidden',!health.login_ready);$('authIntro').textContent=health.login_ready?'Login to the live UBG bid dashboard.':'Create the first admin login to activate the live UBG bid dashboard.'}catch(err){$('setupPanel').classList.add('hidden');$('loginPanel').classList.remove('hidden');authMessage('Backend connection failed at '+API_BASE+'. '+err.message)}}async function setupAdmin(){try{const data=await api('/auth/setup',{method:'POST',body:JSON.stringify({email:$('setupEmail').value,password:$('setupPassword').value})});finishAuth(data)}catch(err){authMessage(err.message)}}async function login(){try{const data=await api('/auth/login',{method:'POST',body:JSON.stringify({email:$('loginEmail').value,password:$('loginPassword').value})});finishAuth(data)}catch(err){authMessage(err.message)}}async function finishAuth(data){state.token=data.token;state.user=data.user;localStorage.setItem(TOKEN_KEY,data.token);await enterApp()}function logout(){localStorage.removeItem(TOKEN_KEY);location.reload()}async function enterApp(){$('authScreen').classList.add('hidden');$('appScreen').classList.remove('hidden');$('currentUser').textContent=state.user.email+' | '+state.user.role;await loadBids();await loadUsers()}function mapBid(row){return{id:row.id,project_name:row.project_name||'',company:row.company||'',status:row.status||'Opportunities',due_date:row.due_date||'',source:row.source||'',estimator:row.estimator||'',notes:row.notes||'',created_at:row.created_at||'',updated_at:row.updated_at||''}}async function loadBids(){try{state.bids=(await api('/bids')).map(mapBid);render();toast('Dashboard refreshed.')}catch(err){toast(err.message)}}async function loadUsers(){if(!state.user||state.user.role!=='admin'){state.users=[];renderAdmin();return}try{state.users=await api('/auth/users');renderAdmin()}catch{state.users=[];renderAdmin()}}function showScreen(screen){state.screen=screen;document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$('screen-'+screen).classList.add('active');document.querySelectorAll('.primary-tabs .tab-btn').forEach(b=>b.classList.remove('active'));$('tab-'+screen).classList.add('active');render()}function setStatusFilter(status){state.statusFilter=status;document.querySelectorAll('.secondary-tabs .tab-btn').forEach(b=>b.classList.remove('active'));$('filter-'+status).classList.add('active');render()}function setSearch(value){state.search=value;render()}function filtered(scope='all'){const q=state.search.trim().toLowerCase();let list=[...state.bids];if(scope==='opportunities')list=list.filter(b=>b.status==='Opportunities');if(scope==='board')list=list.filter(b=>b.status==='Bidding');if(scope==='pipeline')list=list.filter(b=>['Submitted','Won','Lost'].includes(b.status));if(state.statusFilter!=='All')list=list.filter(b=>b.status===state.statusFilter);if(state.filters.estimator!=='All')list=list.filter(b=>(b.estimator||'Unassigned')===state.filters.estimator);if(state.filters.source!=='All')list=list.filter(b=>(b.source||'Manual')===state.filters.source);if(q)list=list.filter(b=>[b.project_name,b.company,b.status,b.due_date,b.source,b.estimator,b.notes].some(v=>String(v||'').toLowerCase().includes(q)));return list.sort((a,b)=>(STATUS_ORDER.indexOf(a.status)-STATUS_ORDER.indexOf(b.status))||String(a.due_date||'9999').localeCompare(String(b.due_date||'9999')))}function counts(){return STATUS_ORDER.reduce((m,s)=>(m[s]=state.bids.filter(b=>b.status===s).length,m),{})}function uniq(key){return [...new Set(state.bids.map(b=>b[key]||'').filter(Boolean))].sort()}function filtersHtml(){const estimators=uniq('estimator'),sources=uniq('source');return `<aside class="card filters"><div class="card-header"><div><h3>Filters</h3><p>Refine the current view.</p></div></div><div class="card-body"><div class="filter-grid"><label class="filter-label">Estimator<select onchange="stateSetFilter('estimator',this.value)"><option>All</option>${estimators.map(x=>`<option ${state.filters.estimator===x?'selected':''}>${esc(x)}</option>`).join('')}</select></label><label class="filter-label">Source<select onchange="stateSetFilter('source',this.value)"><option>All</option>${sources.map(x=>`<option ${state.filters.source===x?'selected':''}>${esc(x)}</option>`).join('')}</select></label><div class="filter-actions"><button class="btn secondary" onclick="clearFilters()">Clear</button><button class="btn primary" onclick="openBidModal()">Add Bid</button></div></div></div></aside>`}window.stateSetFilter=(k,v)=>{state.filters[k]=v;render()};window.clearFilters=()=>{state.filters={estimator:'All',source:'All'};render()};function render(){renderDashboard();renderList('opportunities','Bid Opportunities','Invitations and intake items awaiting bid intent.');renderList('board','Bid Board','Active pursuits currently being estimated.');renderList('pipeline','Proposal Pipeline','Submitted proposals and outcomes.');renderAdmin()}function renderDashboard(){const c=counts();const active=c.Bidding+c.Submitted;$('screen-dashboard').innerHTML=`<div class="hero"><div class="hero-card"><h1>Bid Command Center</h1><p>Track invitations, bid intent, active pursuits, submitted proposals, and outcomes from one UBG operations dashboard.</p></div><div class="hero-meta"><div class="mini-card"><div class="eyebrow">Backend</div><div class="value">Live</div><div class="sub">${esc(API_BASE)}</div></div><div class="mini-card"><div class="eyebrow">Current User</div><div class="value">${esc(state.user?.role||'User')}</div><div class="sub">${esc(state.user?.email||'')}</div></div></div></div><div class="kpi-grid">${STATUS_ORDER.map(s=>`<div class="card"><div class="card-body"><div class="eyebrow">${s}</div><div class="value">${c[s]}</div><div class="sub">${s==='Opportunities'?'New invites':s==='Bidding'?'Active estimates':s==='Submitted'?'Waiting decision':s==='Won'?'Awarded work':'Closed lost'}</div></div></div>`).join('')}</div><div class="dashboard-grid"><div class="card"><div class="card-header"><div><h2>Priority Queue</h2><p>Open records sorted by workflow and due date.</p></div><button class="btn secondary" onclick="showScreen('opportunities')">Open List</button></div><div class="card-body">${tableHtml(filtered().slice(0,8),false)}</div></div><div class="card"><div class="card-header"><div><h2>Summary</h2><p>Current bid workload.</p></div></div><div class="card-body"><div class="notice"><strong>${active}</strong> active pursuit${active===1?'':'s'} between Bidding and Submitted.</div><br><div class="notice"><strong>${state.bids.length}</strong> total records in the live database.</div></div></div></div>`}function renderList(id,title,subtitle){const scope=id==='opportunities'?'opportunities':id==='board'?'board':id==='pipeline'?'pipeline':'all';const list=filtered(scope);$("screen-"+id).innerHTML=`<div class="layout-grid">${filtersHtml()}<div class="card"><div class="card-header"><div><h2>${title}</h2><p>${subtitle}</p></div><button class="btn secondary" onclick="loadBids()">Refresh</button></div><div class="card-body"><div class="view-toolbar"><div class="search-box"><span>Search</span><input value="${esc(state.search)}" oninput="setSearch(this.value)" placeholder="Search this view"></div><button class="btn primary" onclick="openBidModal()">Add Bid</button><button class="btn secondary" onclick="exportCsv()">Export CSV</button></div>${tableHtml(list,true)}</div></div></div>`}function tableHtml(list,actions){if(!list.length)return '<div class="empty-state">No bid records found.</div>';return `<div class="table-wrap wide-table"><table><thead><tr><th>Status</th><th>Project</th><th>Company / GC</th><th>Due</th><th>Source</th><th>Estimator</th><th>Notes</th>${actions?'<th>Actions</th>':''}</tr></thead><tbody>${list.map(b=>`<tr><td><span class="badge ${esc(b.status)}">${esc(b.status)}</span></td><td><strong>${esc(b.project_name)}</strong></td><td>${esc(b.company)}</td><td>${fmtDate(b.due_date)}</td><td>${esc(b.source||'-')}</td><td>${esc(b.estimator||'-')}</td><td class="wrap">${esc(b.notes||'')}</td>${actions?`<td><div class="row-actions"><button class="btn secondary" onclick="openBidModal('${b.id}')">Edit</button>${STATUS_ORDER.filter(s=>s!==b.status).map(s=>`<button class="btn" onclick="moveStatus('${b.id}','${s}')">${s}</button>`).join('')}<button class="btn danger" onclick="deleteBid('${b.id}')">Delete</button></div></td>`:''}</tr>`).join('')}</tbody></table></div>`}function renderAdmin(){if(!$('screen-admin'))return;const admin=state.user&&state.user.role==='admin';$('screen-admin').innerHTML=`<div class="admin-grid"><div class="card"><div class="card-header"><div><h2>User Management</h2><p>Add approved users who can access the dashboard.</p></div><button class="btn secondary" onclick="loadUsers()">Refresh Users</button></div><div class="card-body">${admin?`<div class="form-grid"><label>New User Email<input id="newUserEmail" type="email" placeholder="user@unitedbuildinggroup.com"></label><label>Temporary Password<input id="newUserPassword" type="password" placeholder="Minimum 8 characters"></label><label>Role<select id="newUserRole"><option value="user">User</option><option value="admin">Admin</option></select></label><div style="align-self:end"><button class="btn black" onclick="createUser()">Add User</button></div></div><br>`:'<div class="notice">Only admin users can create additional users.</div><br>'}<div class="table-wrap"><table><thead><tr><th>Email</th><th>Role</th><th>Active</th><th>Created</th></tr></thead><tbody>${state.users.map(u=>`<tr><td>${esc(u.email)}</td><td>${esc(u.role)}</td><td>${u.is_active?'Yes':'No'}</td><td>${fmtDate((u.created_at||'').slice(0,10))}</td></tr>`).join('')}</tbody></table></div></div></div><div class="card"><div class="card-header"><div><h2>Integration Roadmap</h2><p>Next systems to connect after this dashboard is stable.</p></div></div><div class="card-body"><div class="notice"><strong>Email Intake</strong><br>Connect bids@unitedbuildinggroup.com for automatic bid invitation ingestion.</div><br><div class="notice"><strong>Platform Intake</strong><br>Future connectors can map BuildingConnected, Procore, and PlanHub into Opportunities.</div><br><div class="notice"><strong>Backend</strong><br>${esc(API_BASE)}</div></div></div></div>`}window.createUser=async()=>{try{await api('/auth/users',{method:'POST',body:JSON.stringify({email:$('newUserEmail').value,password:$('newUserPassword').value,role:$('newUserRole').value})});toast('User added.');await loadUsers()}catch(err){toast(err.message)}};function openBidModal(id=''){const b=state.bids.find(x=>String(x.id)===String(id))||{};$('overlay').classList.add('open');$('modal').classList.add('open');$('modal').innerHTML=`<div class="modal-card"><div class="modal-header"><div><h2 style="margin:0">${id?'Edit':'Add'} Bid Opportunity</h2><p class="sub">Create or update a live bid record.</p></div><button class="btn secondary" onclick="closeModal()">Close</button></div><div class="modal-body"><div class="form-grid"><input id="bidId" type="hidden" value="${esc(id)}"><label>Project Name<input id="projectName" value="${esc(b.project_name||'')}" placeholder="Project name"></label><label>Company / GC<input id="company" value="${esc(b.company||'')}" placeholder="Company or GC"></label><label>Due Date<input id="dueDate" type="date" value="${esc((b.due_date||'').slice(0,10))}"></label><label>Source<select id="source"><option value="">Select source</option>${['Manual Entry','bids@unitedbuildinggroup.com','BuildingConnected','Procore','PlanHub','Other'].map(x=>`<option ${b.source===x?'selected':''}>${x}</option>`).join('')}</select></label><label>Estimator<input id="estimator" value="${esc(b.estimator||'')}" placeholder="Estimator"></label><label>Status<select id="status">${STATUS_ORDER.map(s=>`<option value="${s}" ${(b.status||'Opportunities')===s?'selected':''}>${s}</option>`).join('')}</select></label><label class="full">Notes<textarea id="notes" placeholder="Scope, location, invite notes, addenda notes, etc.">${esc(b.notes||'')}</textarea></label></div><div class="row-actions"><button class="btn black" onclick="saveBid()">${id?'Save Changes':'Add Opportunity'}</button><button class="btn secondary" onclick="closeModal()">Cancel</button></div></div></div>`}function closeModal(){$('overlay').classList.remove('open');$('modal').classList.remove('open');$('modal').innerHTML=''}window.saveBid=async()=>{const id=$('bidId').value;const payload={project_name:$('projectName').value,company:$('company').value,due_date:$('dueDate').value||null,source:$('source').value,estimator:$('estimator').value,status:$('status').value,notes:$('notes').value};try{await api(id?'/bids/'+id:'/bids',{method:id?'PUT':'POST',body:JSON.stringify(payload)});closeModal();toast(id?'Bid updated.':'Bid added.');await loadBids()}catch(err){toast(err.message)}};window.moveStatus=async(id,status)=>{try{await api('/bids/'+id+'/status',{method:'POST',body:JSON.stringify({status})});toast('Moved to '+status+'.');await loadBids()}catch(err){toast(err.message)}};window.deleteBid=async id=>{if(!confirm('Delete this bid?'))return;try{await api('/bids/'+id,{method:'DELETE'});toast('Bid deleted.');await loadBids()}catch(err){toast(err.message)}};function exportCsv(){const rows=filtered().map(b=>({Status:b.status,Project:b.project_name,Company:b.company,Due:b.due_date,Source:b.source,Estimator:b.estimator,Notes:b.notes}));const header=Object.keys(rows[0]||{Status:'',Project:'',Company:'',Due:'',Source:'',Estimator:'',Notes:''});const csv=[header.join(','),...rows.map(r=>header.map(h=>'"'+String(r[h]||'').replace(/"/g,'""')+'"').join(','))].join('\n');const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ubg-bids.csv';a.click();URL.revokeObjectURL(a.href)}init()})();
</script>
